{% extends "base.html" %}
{% block content %}
<div class="page-header">
    <h2>Список книг</h2>
    <a href="/add_book_page" class="btn">Добавить книгу</a>
</div>

<div class="card table-wrap">
    <table>
        <tr>
            <th>ID</th>
            <th>Название</th>
            <th>Автор</th>
            <th>Статус</th>
            <th>Действие</th>
        </tr>
        {% for book in books %}
        <tr>
            <td>{{ book.id }}</td>
            <td>{{ book.title }}</td>
            <td>{{ book.author }}</td>
            <td>
                <span class="status status-{{ book.status }}">{{ book.status }}</span>
            </td>
            <td>
                <form method="post" action="/delete_book/{{ book.id }}" class="inline-form">
                    <button type="submit" class="btn btn-muted">Удалить</button>
                </form>
            </td>
        </tr>
        {% endfor %}
    </table>
</div>
{% endblock %}
