{% extends "base.html" %}
{% block content %}
<div class="page-header">
    <h2>Выдача книг</h2>
</div>

<div class="card form-card" style="margin-bottom: 18px;">
    <form method="post" action="/issue_page" class="form-grid">
        <div>
            <label>Книга</label>
            <select name="book_id">
                {% for book in books %}
                    {% if book.status == "available" %}
                        <option value="{{ book.id }}">{{ book.title }}</option>
                    {% endif %}
                {% endfor %}
            </select>
        </div>

        <div>
            <label>Читатель</label>
            <select name="reader_id">
                {% for reader in readers %}
                    <option value="{{ reader.id }}">{{ reader.full_name }}</option>
                {% endfor %}
            </select>
        </div>

        <button type="submit" class="btn">Выдать книгу</button>
    </form>
</div>

<div class="card table-wrap">
    <table>
        <tr>
            <th>ID</th>
            <th>Книга</th>
            <th>Читатель</th>
            <th>Статус</th>
            <th>Действие</th>
        </tr>
        {% for issue in issues %}
        <tr>
            <td>{{ issue.id }}</td>
            <td>{{ issue.book.title }}</td>
            <td>{{ issue.reader.full_name }}</td>
            <td>
                <span class="status status-{{ issue.status }}">{{ issue.status }}</span>
            </td>
            <td>
                {% if issue.status == "issued" %}
                <form method="post" action="/return_book/{{ issue.id }}" class="inline-form">
                    <button type="submit" class="btn btn-muted">Вернуть</button>
                </form>
                {% endif %}
            </td>
        </tr>
        {% endfor %}
    </table>
</div>
{% endblock %}
