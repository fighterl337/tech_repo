{% extends "base.html" %}
{% block content %}
<div class="page-header">
    <h2>Список читателей</h2>
    <a href="/add_reader_page" class="btn">Добавить читателя</a>
</div>

<div class="card table-wrap">
    <table>
        <tr>
            <th>ID</th>
            <th>ФИО</th>
            <th>Email</th>
            <th>Телефон</th>
        </tr>
        {% for reader in readers %}
        <tr>
            <td>{{ reader.id }}</td>
            <td>{{ reader.full_name }}</td>
            <td>{{ reader.email }}</td>
            <td>{{ reader.phone }}</td>
        </tr>
        {% endfor %}
    </table>
</div>
{% endblock %}
