{% extends "base.html" %}
{% block content %}

<h2>Добавить читателя</h2>

<form method="post">
    <label>ФИО:</label><br>
    <input type="text" name="full_name" required><br><br>

    <label>Email:</label><br>

    <label>Телефон:</label><br>
    <input type="text" name="phone" required><br><br>

    <button type="submit">Добавить</button>
</form>

{% endblock %}
